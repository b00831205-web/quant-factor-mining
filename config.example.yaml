# quantmine example config -- copy to config.yaml and adjust as needed.
# Every key and field is optional; omitted values fall back to the defaults
# (which are the values annotated below).

data_acquisition:
  checkpoint_dir: tmp/checkpoint
  max_retries: 3
  wait: 60                  # seconds to wait before retrying a failed batch download

momentum:
  day: 5                    # momentum lookback in days (5 = 5-day momentum)

forward_return:
  periods: [1, 5, 20]       # holding periods in trading days

newey_west:
  lag_multiplier: 2         # NW lag = lag_multiplier * (holding period - 1)

orthogonalize:
  threshold: 0.03           # factors with average |IR| below this are dropped
  min_period: 60            # minimum window for the expanding beta estimate

time_series_stationary_test:
  rolling_period: 126       # rolling IC window (~half a year)
  periods: [1, 5, 20]       # ACF lags

backtest:
  part: 5                   # number of quantile groups (5 = quintiles)

transaction_cost:
  cost_per_trade: 0.001     # one-way rate, charged on actual turnover

carhart_attribution:
  maxlags: 20               # maximum lag for HAC standard errors
